<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asterisk - Single Player</title>
  <style>
    :root {
      --bg: #000;
      --fg: #fff;
      --panel: #0c0c0c;
      --accent: #ffe44d;
      --muted: #cfcfcf;
      --button-bg: #d3d3d3;
      --button-fg: #000;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 20%, #1a1a1a 0%, #000 55%);
      color: var(--fg);
      font-family: "Courier New", Courier, monospace;
      padding: 16px;
    }

    .game {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid #333;
      box-shadow: 0 0 0 1px #000 inset, 0 14px 30px rgba(0, 0, 0, 0.6);
      padding: 12px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      min-height: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .row .instruction {
      color: var(--accent);
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      background: #000;
      border: 1px solid #333;
      margin-bottom: 10px;
    }

    button {
      border: 0;
      background: var(--button-bg);
      color: var(--button-fg);
      font-weight: 700;
      font-family: inherit;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <main class="game" aria-label="Asterisk game">
    <div class="row">
      <div id="levelLabel">Level 1</div>
      <div id="recordLabel">Record:</div>
    </div>

    <div class="row">
      <div class="instruction">Hold Space / ArrowUp / Ctrl / Enter to move up</div>
      <div id="speedLabel">20ms tick</div>
    </div>

    <canvas id="gameCanvas" width="300" height="200" aria-label="Asterisk play area"></canvas>

    <div class="row">
      <button id="newGameBtn" type="button">1 Player</button>
      <div class="status" id="statusLabel">Press Start to play</div>
    </div>
  </main>

  <script>
    (function () {
      const WIDTH = 300;
      const HEIGHT = 200;
      const BASE_TICK_MS = 20;
      const SPEED_STEP_MS = 1;
      const MAX_SPEED_LEVEL = 10;
      const PLAYER_COLOR = [255, 255, 0, 255];
      const BLACK = [0, 0, 0, 255];
      const STORAGE_NAME_KEY = "asterisk.record.name";
      const STORAGE_LEVEL_KEY = "asterisk.record.level";

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const levelLabel = document.getElementById("levelLabel");
      const recordLabel = document.getElementById("recordLabel");
      const statusLabel = document.getElementById("statusLabel");
      const speedLabel = document.getElementById("speedLabel");
      const newGameBtn = document.getElementById("newGameBtn");

      let timer = null;
      let countdownTimer = null;
      let keyDown = false;
      let level = 0;
      let xPos = 0;
      let yPos = HEIGHT / 2;
      let recordLevel = Number.parseInt(localStorage.getItem(STORAGE_LEVEL_KEY) || "1", 10);
      let recordName = localStorage.getItem(STORAGE_NAME_KEY) || "nobody";

      if (!Number.isFinite(recordLevel) || recordLevel < 1) {
        recordLevel = 1;
      }

      function showRecord() {
        localStorage.setItem(STORAGE_LEVEL_KEY, String(recordLevel));
        localStorage.setItem(STORAGE_NAME_KEY, recordName);
        recordLabel.textContent = `Record: Level ${recordLevel} by ${recordName}`;
      }

      function drawBoundary() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.strokeStyle = "white";
        ctx.beginPath();
        ctx.moveTo(0.5, 0.5);
        ctx.lineTo(WIDTH - 0.5, 0.5);
        ctx.lineTo(WIDTH - 0.5, HEIGHT - 0.5);
        ctx.lineTo(0.5, HEIGHT - 0.5);
        ctx.stroke();

        // Carve a small exit in the right wall to match the original game.
        ctx.strokeStyle = "black";
        ctx.beginPath();
        ctx.moveTo(WIDTH - 0.5, (HEIGHT / 2) - 15);
        ctx.lineTo(WIDTH - 0.5, (HEIGHT / 2) + 15);
        ctx.stroke();
      }

      function drawAsterisks() {
        const count = level * 3;
        ctx.fillStyle = "white";

        for (let i = 0; i < count; i += 1) {
          const x = randomInt(10, WIDTH - 10);
          const y = randomInt(0, HEIGHT - 10);
          ctx.fillRect(x, y, 2, 2);
        }
      }

      function drawStartIndicator() {
        const indicatorY = Math.max(2, Math.min(HEIGHT - 3, yPos));
        ctx.fillStyle = "rgb(80, 220, 255)";
        ctx.fillRect(0, indicatorY - 2, 1, 5);
      }

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min)) + min;
      }

      function isBlackPixel(x, y) {
        if (x < 0 || x >= WIDTH || y < 0 || y >= HEIGHT) {
          return false;
        }
        const data = ctx.getImageData(x, y, 1, 1).data;
        return data[0] === BLACK[0] && data[1] === BLACK[1] && data[2] === BLACK[2];
      }

      function drawPlayerPixel() {
        const imageData = ctx.createImageData(1, 1);
        imageData.data.set(PLAYER_COLOR);
        ctx.putImageData(imageData, xPos, yPos);
      }

      function redrawScreen() {
        drawBoundary();
        drawAsterisks();
        drawStartIndicator();
      }

      function getTickMsForLevel(currentLevel) {
        const speedLevel = Math.min(Math.max(currentLevel, 1), MAX_SPEED_LEVEL);
        return BASE_TICK_MS - ((speedLevel - 1) * SPEED_STEP_MS);
      }

      function updateSpeedLabel() {
        speedLabel.textContent = `${getTickMsForLevel(level)}ms tick`;
      }

      function stopCountdown() {
        if (countdownTimer !== null) {
          window.clearInterval(countdownTimer);
          countdownTimer = null;
        }
      }

      function newLevel() {
        level += 1;
        xPos = 0;
        yPos = Math.floor(HEIGHT / 2);
        keyDown = false;
        levelLabel.textContent = `Level ${level}`;
        updateSpeedLabel();
        statusLabel.textContent = "";
        redrawScreen();
      }

      function playCrashAnimation(crashX, crashY, onDone) {
        const durationMs = 280;
        const particleCount = 14;
        const cx = Math.max(0, Math.min(WIDTH - 1, crashX));
        const cy = Math.max(0, Math.min(HEIGHT - 1, crashY));
        const particles = [];

        for (let i = 0; i < particleCount; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 8 + Math.random() * 16;
          particles.push({
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: Math.random() > 0.5 ? 2 : 3,
            color: Math.random() > 0.35 ? "255,210,80" : "255,255,255"
          });
        }

        let startTime = null;

        function frame(now) {
          if (startTime === null) {
            startTime = now;
          }

          const elapsed = now - startTime;
          const t = Math.min(elapsed / durationMs, 1);
          const alpha = 1 - t;

          for (const p of particles) {
            const px = cx + (p.vx * t);
            const py = cy + (p.vy * t) + (22 * t * t);
            ctx.fillStyle = `rgba(${p.color}, ${alpha})`;
            ctx.fillRect(Math.round(px), Math.round(py), p.size, p.size);
          }

          ctx.strokeStyle = `rgba(255,235,160, ${alpha * 0.8})`;
          ctx.beginPath();
          ctx.arc(cx, cy, 2 + (t * 10), 0, Math.PI * 2);
          ctx.stroke();

          if (t < 1) {
            window.requestAnimationFrame(frame);
          } else {
            onDone();
          }
        }

        window.requestAnimationFrame(frame);
      }

      function finalizeGameOver() {

        if (level > recordLevel) {
          const name = window.prompt("High Score! Enter your name:", recordName);
          if (name !== null) {
            const trimmed = name.trim();
            if (trimmed.length > 0) {
              recordName = trimmed.slice(0, 20);
            }
          }
          recordLevel = level;
          showRecord();
          statusLabel.textContent = "New high score!";
        } else {
          statusLabel.textContent = "Game Over";
          window.alert("Game Over");
        }

        newGameBtn.disabled = false;
      }

      function endGame(crashX, crashY) {
        stopTimer();
        stopCountdown();
        playCrashAnimation(crashX, crashY, finalizeGameOver);
      }

      function beginLevelWithCountdown() {
        stopTimer();
        stopCountdown();
        newLevel();

        let remaining = 3;
        statusLabel.textContent = `Starting in ${remaining}...`;
        countdownTimer = window.setInterval(function () {
          remaining -= 1;
          if (remaining > 0) {
            statusLabel.textContent = `Starting in ${remaining}...`;
            return;
          }

          stopCountdown();
          statusLabel.textContent = "";
          startTimer();
        }, 1000);
      }

      function tick() {
        xPos += 1;
        yPos += keyDown ? -1 : 1;

        if (xPos >= WIDTH) {
          beginLevelWithCountdown();
          return;
        }

        if (!isBlackPixel(xPos, yPos)) {
          endGame(xPos, yPos);
          return;
        }

        drawPlayerPixel();
      }

      function startTimer() {
        stopTimer();
        timer = window.setInterval(tick, getTickMsForLevel(level));
      }

      function stopTimer() {
        if (timer !== null) {
          window.clearInterval(timer);
          timer = null;
        }
      }

      function startNewGame() {
        level = 0;
        newGameBtn.disabled = true;
        statusLabel.textContent = "";
        beginLevelWithCountdown();
      }

      function handleKeyDown(event) {
        if (event.code === "Space" || event.code === "ArrowUp" || event.key === "Control" || event.code === "Enter") {
          keyDown = true;
          event.preventDefault();
        }
      }

      function handleKeyUp(event) {
        if (event.code === "Space" || event.code === "ArrowUp" || event.key === "Control" || event.code === "Enter") {
          keyDown = false;
          event.preventDefault();
        }
      }

      newGameBtn.addEventListener("click", startNewGame);
      window.addEventListener("keydown", handleKeyDown);
      window.addEventListener("keyup", handleKeyUp);

      showRecord();
      newLevel();

      window.addEventListener("beforeunload", function () {
        stopTimer();
        stopCountdown();
      });
    })();
  </script>
</body>
</html>
